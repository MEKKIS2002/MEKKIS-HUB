<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Hub</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23C96A3A'/%3E%3Cpath d='M50 14L12 39v47h26V65h24v21h26V39Z' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAF8F4;--bg-card:#FFF;--bg-sec:#F3F1EC;--tx:#1A1916;--tx2:#6B6860;--txm:#A09D97;--br:#E8E5DE;--brh:#D4CFC6;--ac:#C96A3A;--acs:#FBF0E9;--ach:#B05A2E;--r:12px;--rs:8px;--sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shh:0 4px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);--t:.18s ease}
[data-theme="dark"]{--bg:#16150F;--bg-card:#1E1D16;--bg-sec:#252419;--tx:#F0EDE5;--tx2:#8C897F;--txm:#5C5A52;--br:#2E2C24;--brh:#3E3B31;--ac:#D97B4A;--acs:#2A1E13;--ach:#E88A58;--sh:0 1px 3px rgba(0,0,0,.3);--shh:0 4px 16px rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background var(--t),color var(--t)}
header{position:sticky;top:0;z-index:200;border-bottom:1px solid var(--br);padding:0 2rem;backdrop-filter:blur(10px);background:color-mix(in srgb,var(--bg) 88%,transparent)}
.hdr{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;height:58px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-mark{width:28px;height:28px;border-radius:8px;background:var(--ac);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px;fill:white}
.logo-text{font-family:'Instrument Serif',Georgia,serif;font-size:1.15rem;color:var(--tx);letter-spacing:-.01em}
.srch{flex:1;max-width:360px;position:relative}
.srch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--txm);pointer-events:none}
#search{width:100%;height:34px;border:1px solid var(--br);border-radius:8px;background:var(--bg-sec);color:var(--tx);font-family:inherit;font-size:.85rem;padding:0 2rem 0 2.1rem;outline:none;transition:border-color var(--t),box-shadow var(--t)}
#search::placeholder{color:var(--txm)}
#search:focus{border-color:var(--ac);box-shadow:0 0 0 3px color-mix(in srgb,var(--ac) 15%,transparent)}
.srch-sc{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--txm);background:var(--br);padding:1px 5px;border-radius:4px;pointer-events:none}
.hdr-r{display:flex;align-items:center;gap:6px;margin-left:auto}
.bti{width:32px;height:32px;border:none;background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:background var(--t),color var(--t)}
.bti:hover{background:var(--bg-sec);color:var(--tx)}
.bti svg{width:17px;height:17px}
.tabs-bar{border-bottom:1px solid var(--br);background:var(--bg);padding:0 2rem}
.tabs-inner{max-width:1100px;margin:0 auto;display:flex}
.tab-btn{padding:0 1px;margin-right:24px;height:44px;display:flex;align-items:center;gap:7px;font-family:inherit;font-size:.875rem;font-weight:400;color:var(--tx2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color var(--t),border-color var(--t);white-space:nowrap;position:relative;top:1px}
.tab-btn:hover{color:var(--tx)}.tab-btn.active{color:var(--tx);border-bottom-color:var(--ac);font-weight:500}
.tab-badge{font-size:11px;background:var(--acs);color:var(--ac);padding:1px 6px;border-radius:10px;font-weight:500}
.tab-btn.active .tab-badge{background:var(--ac);color:white}
main{max-width:1100px;margin:0 auto;padding:2rem}

/* WEATHER */
.wx-card{background:var(--bg-card);border:1px solid var(--br);border-radius:var(--r);margin-bottom:1.75rem;box-shadow:var(--sh);overflow:hidden}
.wx-top{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;user-select:none;transition:background var(--t)}
.wx-top:hover{background:var(--bg-sec)}
.wx-em{font-size:26px;flex-shrink:0;line-height:1;width:32px;text-align:center}
.wx-info{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
.wx-city{font-size:.75rem;font-weight:500;color:var(--ac);background:var(--acs);padding:2px 8px;border-radius:10px;flex-shrink:0}
.wx-temp{font-size:1.25rem;font-weight:500;color:var(--tx);line-height:1}
.wx-cond{font-size:.83rem;color:var(--tx2)}
.wx-meta{display:flex;gap:10px;font-size:.75rem;color:var(--txm)}
.wx-chev{width:28px;height:28px;border:1px solid var(--br);border-radius:6px;background:transparent;color:var(--txm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wx-chev svg{width:14px;height:14px;transition:transform .2s}
.wx-chev.open svg{transform:rotate(180deg)}
.wx-divider{height:1px;background:var(--br)}
.wx-scroll{display:flex;overflow-x:auto;gap:4px;padding:8px 12px 12px;scrollbar-width:thin}
.wx-scroll::-webkit-scrollbar{height:4px}.wx-scroll::-webkit-scrollbar-track{background:transparent}.wx-scroll::-webkit-scrollbar-thumb{background:var(--brh);border-radius:2px}
.wx-hr{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:54px;padding:10px 6px;border-radius:8px;border:1px solid transparent;flex-shrink:0;transition:background var(--t)}
.wx-hr.now{background:var(--acs);border-color:color-mix(in srgb,var(--ac) 30%,var(--br))}
.wx-ht{font-size:.68rem;color:var(--txm);font-weight:500}
.wx-he{font-size:20px;line-height:1}
.wx-hc{font-size:.82rem;font-weight:500;color:var(--tx)}
.wx-hp{font-size:.65rem;color:var(--ac)}
.wx-loading{font-size:.82rem;color:var(--txm)}

/* BOOKMARKS */
.bm-section{margin-bottom:2rem}
.bm-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bm-label{font-size:.72rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--txm);flex-shrink:0}
.bm-divider{flex:1;height:1px;background:var(--br)}
.bm-add{width:22px;height:22px;border-radius:6px;border:1px dashed var(--brh);background:transparent;cursor:pointer;color:var(--txm);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:border-color var(--t),color var(--t),background var(--t)}
.bm-add:hover{border-color:var(--ac);color:var(--ac);background:var(--acs)}
.bm-grid{display:flex;flex-wrap:wrap;gap:7px}
.bookmark{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 11px 0 9px;background:var(--bg-card);border:1px solid var(--br);border-radius:8px;text-decoration:none;color:inherit;box-shadow:var(--sh);transition:border-color var(--t),box-shadow var(--t),background var(--t);cursor:pointer;white-space:nowrap;position:relative}
.bookmark:hover{border-color:var(--brh);box-shadow:var(--shh);background:var(--bg-sec)}
.bm-emoji{font-size:13px;line-height:1;flex-shrink:0}
.bm-title{font-size:.8rem;font-weight:500;color:var(--tx)}
.bm-sep{width:1px;height:14px;background:var(--br);flex-shrink:0}
.bm-domain{font-size:.71rem;color:var(--txm)}
.bm-edit{position:absolute;right:-1px;top:-1px;bottom:-1px;width:28px;border:none;border-left:1px solid var(--br);border-radius:0 7px 7px 0;background:var(--bg-sec);color:var(--txm);font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:background var(--t),color var(--t)}
.bookmark:hover .bm-edit{display:flex}
.bm-edit:hover{background:var(--brh);color:var(--tx)}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:1.1rem}
.sec-title{font-family:'Instrument Serif',Georgia,serif;font-size:1.05rem;color:var(--tx);font-weight:400}
.sec-count{font-size:.8rem;color:var(--txm)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:2.5rem}
.card{background:var(--bg-card);border:1px solid var(--br);border-radius:var(--r);padding:1.1rem 1.2rem;text-decoration:none;color:inherit;box-shadow:var(--sh);transition:box-shadow var(--t),border-color var(--t),transform var(--t);display:flex;flex-direction:column;gap:10px;cursor:pointer;position:relative}
.card:hover{box-shadow:var(--shh);border-color:var(--brh);transform:translateY(-1px)}
.card-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.card-title{font-size:.9rem;font-weight:500;color:var(--tx);line-height:1.3}
.card-desc{font-size:.78rem;color:var(--tx2);line-height:1.5;margin-top:1px}
.card-meta{margin-top:auto;padding-top:8px;border-top:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.card-tag{font-size:.7rem;color:var(--txm);background:var(--bg-sec);padding:2px 7px;border-radius:5px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-time{font-size:.7rem;color:var(--txm)}
.card.featured{background:linear-gradient(135deg,var(--acs) 0%,var(--bg-card) 100%);border-color:color-mix(in srgb,var(--ac) 25%,var(--br))}
.card-edit{position:absolute;top:8px;right:8px;width:26px;height:26px;border:1px solid var(--br);border-radius:6px;background:var(--bg-card);color:var(--txm);font-size:12px;cursor:pointer;opacity:0;transition:opacity var(--t),background var(--t);display:flex;align-items:center;justify-content:center}
.card:hover .card-edit{opacity:1}
.card-edit:hover{background:var(--bg-sec);color:var(--tx);border-color:var(--brh)}
.ic-orange{background:#FBF0E9;color:#C96A3A}.ic-blue{background:#EBF3FB;color:#2E78BE}.ic-green{background:#EAF5EC;color:#2E7D41}
.ic-purple{background:#F0EEF9;color:#6B52C8}.ic-gray{background:#F0EEE8;color:#6B6860}.ic-teal{background:#E4F4F0;color:#1E8C74}
.ic-red{background:#FCF0EE;color:#C0432B}.ic-amber{background:#FBF4E6;color:#B07A14}.ic-pink{background:#FBF0F5;color:#B5446E}
[data-theme="dark"] .ic-orange{background:#2A1E13;color:#D97B4A}[data-theme="dark"] .ic-blue{background:#0D1E2E;color:#5E9FD4}[data-theme="dark"] .ic-green{background:#0E1E12;color:#5CB872}
[data-theme="dark"] .ic-purple{background:#1A1630;color:#9D85E0}[data-theme="dark"] .ic-gray{background:#252419;color:#A09D97}[data-theme="dark"] .ic-teal{background:#0B1E1A;color:#3DC4A8}
[data-theme="dark"] .ic-red{background:#1E0E0C;color:#D96A56}[data-theme="dark"] .ic-amber{background:#1E1608;color:#D4A040}[data-theme="dark"] .ic-pink{background:#1E0E16;color:#D46890}
.add-card-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;background:transparent;border:1px dashed var(--brh);border-radius:var(--rs);color:var(--txm);font-family:inherit;font-size:.85rem;cursor:pointer;transition:all var(--t);margin-bottom:2.5rem;width:100%}
.add-card-btn:hover{border-color:var(--ac);color:var(--ac);background:var(--acs)}
.cal-section{margin-bottom:2rem}
.cal-hdr{display:flex;align-items:center;gap:10px;margin-bottom:1rem;cursor:pointer;user-select:none}
.cal-toggle{width:28px;height:28px;border:1px solid var(--br);border-radius:6px;background:var(--bg-card);color:var(--txm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-toggle svg{width:14px;height:14px;transition:transform .2s}
.cal-toggle.open svg{transform:rotate(180deg)}
.cal-frame{border:1px solid var(--br);border-radius:var(--r);overflow:hidden}
.cal-frame iframe{display:block;width:100%;height:480px;border:none}
.cal-note{font-size:.72rem;color:var(--txm);margin-top:8px}
.tab-panel{display:none}.tab-panel.active{display:block}
.empty-state{text-align:center;padding:3rem 0;color:var(--txm);font-size:.875rem;display:none}
.empty-state.visible{display:block}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg-card);border:1px solid var(--br);border-radius:var(--r);width:min(500px,94vw);max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.18);transform:translateY(8px);transition:transform .2s}
.overlay.open .modal{transform:none}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--br)}
.modal-hd h3{font-family:'Instrument Serif',Georgia,serif;font-size:1.1rem;font-weight:400;color:var(--tx)}
.modal-x{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:6px;font-size:20px;color:var(--txm);display:flex;align-items:center;justify-content:center;transition:background var(--t)}
.modal-x:hover{background:var(--bg-sec);color:var(--tx)}
.modal-body{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1rem}
.modal-ft{padding:1rem 1.5rem;border-top:1px solid var(--br);display:flex;align-items:center;gap:8px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-grp{display:flex;flex-direction:column;gap:6px}
.f-lbl{font-size:.8rem;font-weight:500;color:var(--tx2)}
.f-hint{font-size:.71rem;color:var(--txm)}
.f-in,.f-ta,.f-sel{width:100%;border:1px solid var(--br);border-radius:8px;background:var(--bg-sec);color:var(--tx);font-family:inherit;font-size:.875rem;padding:8px 12px;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.f-in:focus,.f-ta:focus,.f-sel:focus{border-color:var(--ac);box-shadow:0 0 0 3px color-mix(in srgb,var(--ac) 15%,transparent)}
.f-ta{resize:vertical;min-height:76px}
.em-wrap{display:flex;gap:6px;align-items:stretch}
.em-wrap .f-in{text-align:center;font-size:1.3rem;flex:1;min-width:0}
.ep-btn{flex-shrink:0;width:36px;height:38px;padding:0;border:1px solid var(--br);border-radius:8px;background:var(--bg-sec);color:var(--tx2);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color var(--t),background var(--t)}
.ep-btn:hover{border-color:var(--ac);background:var(--acs)}
.cpick{display:flex;flex-wrap:wrap;gap:7px;padding:2px 0}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;outline:2px solid transparent;transition:border-color .15s,outline-color .15s,transform .15s;flex-shrink:0}
.cdot.active{border-color:var(--bg-card);outline-color:var(--tx);transform:scale(1.18)}
.tog-row{display:flex;align-items:center;justify-content:space-between}
.tog-lbl{font-size:.875rem;color:var(--tx2)}
.tog-sw{position:relative;width:40px;height:22px}
.tog-sw input{opacity:0;width:0;height:0;position:absolute}
.tog-tr{position:absolute;inset:0;background:var(--br);border-radius:11px;cursor:pointer;transition:background .2s}
.tog-sw input:checked+.tog-tr{background:var(--ac)}
.tog-th{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:white;transition:transform .2s;pointer-events:none}
.tog-sw input:checked+.tog-tr .tog-th{transform:translateX(18px)}
.btn-p{padding:7px 18px;background:var(--ac);color:white;border:none;border-radius:8px;font-family:inherit;font-size:.875rem;font-weight:500;cursor:pointer;transition:background .15s}
.btn-p:hover{background:var(--ach)}
.btn-s{padding:7px 18px;background:transparent;color:var(--tx2);border:1px solid var(--br);border-radius:8px;font-family:inherit;font-size:.875rem;cursor:pointer;transition:background .15s}
.btn-s:hover{background:var(--bg-sec)}
.btn-d{padding:7px 14px;background:transparent;color:#C0432B;border:1px solid #F0CCCC;border-radius:8px;font-family:inherit;font-size:.875rem;cursor:pointer}
.btn-d:hover{background:#FEF2F2}
[data-theme="dark"] .btn-d{color:#D96A56;border-color:#3E2020}[data-theme="dark"] .btn-d:hover{background:#2A1010}

/* EMOJI PICKER */
.ep{position:fixed;background:var(--bg-card);border:1px solid var(--br);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.16);width:316px;max-height:340px;display:flex;flex-direction:column;z-index:9999;overflow:hidden}
.ep-srch{border:none;border-bottom:1px solid var(--br);background:transparent;color:var(--tx);font-family:inherit;font-size:.85rem;padding:10px 14px;outline:none}
.ep-srch::placeholder{color:var(--txm)}
.ep-cats{display:flex;overflow-x:auto;gap:2px;padding:5px 6px;border-bottom:1px solid var(--br);flex-shrink:0;scrollbar-width:none}
.ep-cats::-webkit-scrollbar{display:none}
.ep-cat{border:none;background:transparent;cursor:pointer;padding:5px 8px;border-radius:6px;font-size:17px;transition:background var(--t);flex-shrink:0;line-height:1}
.ep-cat:hover,.ep-cat.active{background:var(--acs)}
.ep-grid{display:flex;flex-wrap:wrap;padding:6px;overflow-y:auto;flex:1;gap:1px;align-content:flex-start}
.ep-em{width:36px;height:36px;border:none;background:transparent;border-radius:6px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--t);line-height:1}
.ep-em:hover{background:var(--acs)}

.kbd-hint{position:fixed;bottom:1.25rem;right:1.5rem;background:var(--bg-card);border:1px solid var(--br);border-radius:var(--rs);padding:8px 12px;font-size:.72rem;color:var(--txm);display:flex;gap:12px;box-shadow:var(--sh);z-index:50}
.kbd-hint kbd{background:var(--bg-sec);border:1px solid var(--br);border-radius:4px;padding:1px 5px;font-family:inherit;color:var(--tx2)}
.card.hidden,.bookmark.hidden{display:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brh);border-radius:3px}
@media(max-width:640px){header,.tabs-bar{padding:0 1rem}main{padding:1.25rem 1rem}.card-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}.kbd-hint{display:none}.bm-domain,.bm-sep{display:none}}
</style>
</head>
<body data-theme="light">
<header>
  <div class="hdr">
    <a class="logo" href="#"><div class="logo-mark"><svg viewBox="0 0 16 16"><path d="M8 2L2 6v8h4v-4h4v4h4V6L8 2z"/></svg></div><span class="logo-text">Min Hub</span></a>
    <div class="srch">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Søk etter verktøy og bokmerker..." autocomplete="off">
      <span class="srch-sc">/</span>
    </div>
    <div class="hdr-r">
      <button class="bti" id="dark-toggle">
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </div>
</header>

function getLU(k){const s=LS('hu_'+k);if(!s)return'Aldri brukt';const d=Date.now()-s,m=d/6e4|0,h=d/36e5|0,dy=d/864e5|0;if(m<2)return'Nettopp';if(m<60)return m+' min siden';if(h<24)return h+' t siden';if(dy<7)return dy+' d siden';return new Date(s).toLocaleDateString('nb-NO',{day:'numeric',month:'short'});}

// ── RENDER ───────────────────────────────────────────────

function renderBM(tab){

}
function renderCards(tab){
  const c=document.getElementById('cards-'+tab);
  CARDS[tab].forEach(x=>{if(!SECS[tab].includes(x.section))SECS[tab].push(x.section);});
  let h='';
  SECS[tab].forEach(sec=>{
    const cards=[...CARDS[tab].filter(x=>x.section===sec)].sort((a,b)=>(LS('hu_'+b.id)||0)-(LS('hu_'+a.id)||0));
    if(!cards.length)return;
    h+=`<div class="sec-hdr"><span class="sec-title">${ESC(sec)}</span><span class="sec-count">${cards.length} verktøy</span></div><div class="card-grid">`;

}

const WMO={0:{e:'☀️',l:'Klarvær'},1:{e:'🌤️',l:'Mest klart'},2:{e:'⛅',l:'Delvis skyet'},3:{e:'☁️',l:'Overskyet'},45:{e:'🌫️',l:'Tåke'},48:{e:'🌫️',l:'Rim-tåke'},51:{e:'🌦️',l:'Lett yr'},53:{e:'🌦️',l:'Yr'},55:{e:'🌧️',l:'Kraftig yr'},61:{e:'🌧️',l:'Lett regn'},63:{e:'🌧️',l:'Regn'},65:{e:'🌧️',l:'Kraftig regn'},71:{e:'❄️',l:'Snø'},73:{e:'❄️',l:'Snø'},75:{e:'❄️',l:'Kraftig snø'},80:{e:'🌦️',l:'Regnbyger'},81:{e:'🌧️',l:'Regnbyger'},82:{e:'⛈️',l:'Kraftige byger'},85:{e:'🌨️',l:'Snøbyger'},86:{e:'🌨️',l:'Kraftige snøbyger'},95:{e:'⛈️',l:'Tordenvær'},96:{e:'⛈️',l:'Tordenvær m/hagl'},99:{e:'⛈️',l:'Tordenvær m/hagl'}};
const wmo=c=>WMO[c]||{e:'🌡️',l:'Ukjent'};
let wxOpen=false;
async function loadWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=59.9139&longitude=10.7522&hourly=temperature_2m,precipitation_probability,weather_code&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m&forecast_days=1&timezone=Europe%2FOslo');
    const d=await r.json();const cu=d.current,w=wmo(cu.weather_code);
    document.getElementById('wx-em').textContent=w.e;
    document.getElementById('wx-info').innerHTML=`<span class="wx-city">Oslo</span><span class="wx-temp">${Math.round(cu.temperature_2m)}°C</span><span class="wx-cond">${w.l}</span><div class="wx-meta"><span>💨 ${Math.round(cu.wind_speed_10m)} km/h</span><span>💧 ${cu.relative_humidity_2m}%</span></div>`;
    const nowH=new Date().getHours();
    const hrs=d.hourly.time.map((t,i)=>({h:new Date(t).getHours(),temp:d.hourly.temperature_2m[i],pr:d.hourly.precipitation_probability[i],code:d.hourly.weather_code[i]})).filter((_,i)=>i%2===0);
    document.getElementById('wx-scroll').innerHTML=hrs.map(x=>`<div class="wx-hr${x.h===nowH||x.h===nowH+1?' now':''}"><span class="wx-ht">${String(x.h).padStart(2,'0')}:00</span><span class="wx-he">${wmo(x.code).e}</span><span class="wx-hc">${Math.round(x.temp)}°</span><span class="wx-hp">${x.pr}%</span></div>`).join('');
  }catch(e){document.getElementById('wx-em').textContent='🌡️';document.getElementById('wx-info').innerHTML='<span class="wx-loading">Kan ikke laste vær</span>';}
}

// ── CALENDAR ─────────────────────────────────────────────
let calOpen=false;
function toggleCal(){calOpen=!calOpen;document.getElementById('cal-wrap').style.display=calOpen?'':'none';document.getElementById('cal-toggle').classList.toggle('open',calOpen);if(calOpen){const f=document.getElementById('cal-iframe');if(f.src==='about:blank')f.src='https://calendar.google.com/calendar/embed?src=marcus%40novooi.com&ctz=Europe%2FOslo&wkst=2&showTitle=0&showNav=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0&mode=WEEK&authuser=2';}}

// ── MODAL ────────────────────────────────────────────────
let mMode='',mTab='',mId='';
const overlay=document.getElementById('overlay');
function openModal(mode,tab,id=''){
  mMode=mode;mTab=tab;mId=id;
  document.getElementById('btn-del').style.display=id?'':'none';
  document.getElementById('modal-title').textContent=mode==='bm-add'?'Legg til bokmerke':mode==='bm-edit'?'Rediger bokmerke':id?'Rediger kort':'Legg til kort';
  document.getElementById('modal-body').innerHTML=mode.startsWith('bm')?bmForm(id?BM[tab].find(b=>b.id===id):null):cardForm(id?CARDS[tab].find(c=>c.id===id):null,tab);
  if(mode.startsWith('bm')){
    const ui=document.getElementById('m-url'),di=document.getElementById('m-domain');
    ui.addEventListener('input',()=>{try{const h=new URL(ui.value).hostname.replace(/^www\./,'');if(!di.dataset.m)di.value=h;}catch{}});
    di.addEventListener('input',function(){this.dataset.m='1';});
  }else{setTimeout(()=>document.querySelectorAll('.cdot').forEach(d=>d.addEventListener('click',()=>{document.querySelectorAll('.cdot').forEach(x=>x.classList.remove('active'));d.classList.add('active');})),0);}
  overlay.classList.add('open');
  setTimeout(()=>{const f=document.getElementById('modal-body')?.querySelector('input,textarea');if(f)f.focus();},200);
}
function closeModal(){overlay.classList.remove('open');closePicker();}
function overlayBg(e){if(e.target===overlay)closeModal();}

function bmForm(bm){return`<div class="f-row"><div class="f-grp"><label class="f-lbl">Emoji</label><div class="em-wrap"><input class="f-in" id="m-emoji" value="${ESA(bm?.emoji||'🔗')}" maxlength="4" style="text-align:center;font-size:1.25rem"><button type="button" class="ep-btn" onclick="openPicker('m-emoji')" title="Velg emoji">😊</button></div></div><div class="f-grp"><label class="f-lbl">Tittel</label><input class="f-in" id="m-title" value="${ESA(bm?.title||'')}" placeholder="Tittel"></div></div><div class="f-grp"><label class="f-lbl">URL</label><input class="f-in" id="m-url" type="url" value="${ESA(bm?.url||'')}" placeholder="https://..."></div><div class="f-grp"><label class="f-lbl">Domenenavn</label><input class="f-in" id="m-domain" value="${ESA(bm?.domain||'')}" placeholder="novooi.com"><span class="f-hint">Auto-utfylt fra URL, kan overstyres.</span></div>`;}

function cardForm(c,tab){const sOpts=SECS[tab].map(s=>`<option value="${ESA(s)}"${c?.section===s?' selected':''}>${ESC(s)}</option>`).join('');const dots=COLORS.map(x=>`<button type="button" class="cdot${c?.color===x.id?' active':''}" data-color="${x.id}" style="background:${x.hex}"></button>`).join('');return`<div class="f-row"><div class="f-grp"><label class="f-lbl">Emoji</label><div class="em-wrap"><input class="f-in" id="m-emoji" value="${ESA(c?.emoji||'🔗')}" maxlength="4" style="text-align:center;font-size:1.25rem"><button type="button" class="ep-btn" onclick="openPicker('m-emoji')" title="Velg emoji">😊</button></div></div><div class="f-grp"><label class="f-lbl">Tittel</label><input class="f-in" id="m-title" value="${ESA(c?.title||'')}" placeholder="Verktøy-navn"></div></div><div class="f-grp"><label class="f-lbl">URL</label><input class="f-in" id="m-url" type="url" value="${ESA(c?.url||'')}" placeholder="https://..."></div><div class="f-grp"><label class="f-lbl">Beskrivelse</label><textarea class="f-ta" id="m-desc" placeholder="Kort beskrivelse...">${ESC(c?.desc||'')}</textarea></div><div class="f-grp"><label class="f-lbl">Tagger <span class="f-hint">(mellomrom-separert)</span></label><input class="f-in" id="m-tags" value="${ESA(c?.tags||'')}" placeholder="ai analyse markedsføring"></div><div class="f-grp"><label class="f-lbl">Seksjon</label><input class="f-in" list="sec-dl-${tab}" id="m-section" value="${ESA(c?.section||SECS[tab][0]||'')}" placeholder="Velg eller skriv ny seksjon"><datalist id="sec-dl-${tab}">${sOpts}</datalist></div><div class="f-grp"><label class="f-lbl">Farge</label><div class="cpick">${dots}</div></div><div class="tog-row"><span class="tog-lbl">Fremhevet kort</span><label class="tog-sw"><input type="checkbox" id="m-feat"${c?.featured?' checked':''}><div class="tog-tr"><div class="tog-th"></div></div></label></div>`;}

function handleSave(){
  const emoji=document.getElementById('m-emoji')?.value.trim()||'🔗',title=document.getElementById('m-title')?.value.trim(),url=document.getElementById('m-url')?.value.trim();
  if(!title||!url){alert('Tittel og URL er påkrevd.');return;}
  if(mMode.startsWith('bm')){const domain=document.getElementById('m-domain')?.value.trim()||'';if(mMode==='bm-add'){BM[mTab].push({id:uid(),emoji,title,url,domain});}else{const i=BM[mTab].findIndex(b=>b.id===mId);if(i>-1)BM[mTab][i]={...BM[mTab][i],emoji,title,url,domain};}}
  else{const desc=document.getElementById('m-desc')?.value.trim()||'',tags=document.getElementById('m-tags')?.value.trim()||'',section=document.getElementById('m-section')?.value.trim()||SECS[mTab][0]||'Annet',featured=document.getElementById('m-feat')?.checked||false,color=document.querySelector('.cdot.active')?.dataset.color||'ic-gray';if(!SECS[mTab].includes(section))SECS[mTab].push(section);if(mMode==='card-add'){CARDS[mTab].push({id:uid(),emoji,title,url,desc,tags,section,color,featured});}else{const i=CARDS[mTab].findIndex(c=>c.id===mId);if(i>-1)CARDS[mTab][i]={...CARDS[mTab][i],emoji,title,url,desc,tags,section,color,featured};}}
  persist();renderAll();closeModal();
}
function handleDelete(){if(!confirm('Slett dette elementet?'))return;if(mMode==='bm-edit'){BM[mTab]=BM[mTab].filter(b=>b.id!==mId);}else{CARDS[mTab]=CARDS[mTab].filter(c=>c.id!==mId);SECS[mTab]=SECS[mTab].filter(s=>CARDS[mTab].some(c=>c.section===s));if(!SECS[mTab].length)SECS[mTab]=['Annet'];}persist();renderAll();closeModal();}

// ── EMOJI PICKER ─────────────────────────────────────────
let pickerTarget=null, activeCat=EPC_KEYS[0];
function openPicker(inputId){
  closePicker();
  const inp=document.getElementById(inputId);if(!inp)return;
  pickerTarget=inp;
  const rect=inp.getBoundingClientRect();
  const p=document.createElement('div');p.id='ep-panel';p.className='ep';
  p.innerHTML=`<input class="ep-srch" id="ep-srch" placeholder="Søk..." oninput="epSearch(this.value)"><div class="ep-cats">${EPC_KEYS.map(k=>`<button class="ep-cat${k===activeCat?' active':''}" onclick="epCat('${k}',this)">${k}</button>`).join('')}</div><div class="ep-grid" id="ep-grid"></div>`;
  const left=Math.min(rect.left,window.innerWidth-324);
  const spaceBelow=window.innerHeight-rect.bottom;
  p.style.cssText=`left:${Math.max(4,left)}px;${spaceBelow>350?'top:'+(rect.bottom+window.scrollY+4)+'px':'bottom:'+(window.innerHeight-rect.top+window.scrollY+4)+'px'}`;
  document.body.appendChild(p);epRender(activeCat);
  setTimeout(()=>document.addEventListener('click',epOut),10);
}
function epOut(e){if(!document.getElementById('ep-panel')?.contains(e.target)&&!e.target.classList.contains('ep-btn'))closePicker();}
function closePicker(){const p=document.getElementById('ep-panel');if(p)p.remove();document.removeEventListener('click',epOut);}
function epRender(cat,list){const g=document.getElementById('ep-grid');if(!g)return;const em=list||EPC[cat]||[];g.innerHTML=em.map(e=>`<button class="ep-em" onclick="epPick('${e}')">${e}</button>`).join('');}
function epCat(cat,btn){activeCat=cat;document.querySelectorAll('.ep-cat').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('ep-srch').value='';epRender(cat);}
function epSearch(q){if(!q){epRender(activeCat);return;}const all=Object.values(EPC).flat();epRender(null,all.filter(e=>e.includes(q)));}
function epPick(e){if(pickerTarget)pickerTarget.value=e;closePicker();}

// ── TABS ─────────────────────────────────────────────────
const tabs=document.querySelectorAll('.tab-btn'),panels=document.querySelectorAll('.tab-panel');
let curTab='jobb';
function switchTab(id){tabs.forEach(t=>t.classList.toggle('active',t.dataset.tab===id));panels.forEach(p=>p.classList.toggle('active',p.id==='tab-'+id));curTab=id;}
tabs.forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));

// ── SEARCH ───────────────────────────────────────────────
const si=document.getElementById('search');
si.addEventListener('input',()=>{
  const q=si.value.toLowerCase().trim();
  document.querySelectorAll('.card,.bookmark').forEach(el=>el.classList.toggle('hidden',q!==''&&!(el.dataset.title+' '+(el.dataset.tags||'')).toLowerCase().includes(q)));
  ['jobb','privat'].forEach(t=>{const p=document.getElementById('tab-'+t),v=p.querySelectorAll('.card:not(.hidden),.bookmark:not(.hidden)').length,e=document.getElementById('empty-'+t);if(e)e.classList.toggle('visible',q!==''&&v===0);});
  if(q){panels.forEach(p=>p.classList.add('active'));tabs.forEach(t=>t.classList.remove('active'));}
  else{panels.forEach(p=>p.classList.remove('active'));tabs.forEach(t=>t.classList.remove('active'));switchTab(curTab);}
});

// ── DARK MODE ────────────────────────────────────────────
const dtog=document.getElementById('dark-toggle'),dm=document.getElementById('icon-moon'),ds=document.getElementById('icon-sun');
let dark=LS('hub_theme')==='dark';
function applyTheme(){document.body.setAttribute('data-theme',dark?'dark':'light');dm.style.display=dark?'none':'';ds.style.display=dark?'':'none';SS('hub_theme',dark?'dark':'light');}
applyTheme();dtog.addEventListener('click',()=>{dark=!dark;applyTheme();});

// ── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(overlay.classList.contains('open')){if(e.key==='Escape')closeModal();return;}
  if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'){if(e.key==='Escape'){si.blur();si.value='';si.dispatchEvent(new Event('input'));}return;}
  if(e.key==='j'||e.key==='J')switchTab('jobb');
  if(e.key==='p'||e.key==='P')switchTab('privat');
  if(e.key==='d'||e.key==='D'){dark=!dark;applyTheme();}
  if(e.key==='/'){{e.preventDefault();si.focus();si.select();}}
});

renderAll();
loadWeather();
</script>
</body>
</html>
